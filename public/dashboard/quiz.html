<!DOCTYPE html>
<html lang="pt-br">

<head>
	<link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AquaTech | Quiz</title>

	<link rel="stylesheet" href="./../css/dashboards.css">
	<link rel="stylesheet" href="./../css/estilo.css">
	<link rel="stylesheet" href="./../css/quiz.css">
	<script src="../js/sessao.js"></script>

	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body onload="onloadEsconder()">
	<div class="janela">

		<div class="header-left">
			<h1>AquaTech</h1>
			<div class="hello">
				<h3>Olá, <span id="b_usuario">usuário</span>!</h3>
			</div>
			<div class="btn-nav-white">
				<a href="./cards.html"><h3>Pessoal</h3></a>
			</div>
			<div class="btn-nav-white">
				<a href="./dashboard.html"><h3>Geral</h3></a>
			</div>
			<div class="btn-nav">
				<h3>Quiz</h3>
			</div>
			<div class="btn-logout" onclick="limparSessao()">
				<h3>Sair</h3>
			</div>
		</div>

		<div class="dash">
			<div class="quiz-wrapper">
				<div class="quiz-box">

					<div id="telaInicio" class="quiz-inicio">
						<img src="../assets/imgs/alphaNeovim.png" alt="NeoVim">
						<h2>Quiz NeoVim</h2>
						<button class="quiz-btn" style="width:240px" onclick="iniciarQuiz()">INICIAR QUIZ</button>
					</div>

					<div id="placar" class="quiz-placar" style="display:none">
						<div class="quiz-placar-item acertos">
							✓ acertos: <span class="valor" id="spanCertas">0</span>
						</div>
						<div class="quiz-placar-item erros">
							✗ erros: <span class="valor" id="spanErradas">0</span>
						</div>
					</div>

					<!-- bloco da questão -->
					<div id="jogo" style="display:none">
						<div class="quiz-header" id="spanQuestaoExibida"></div>
						<div class="quiz-card">
							<div class="quiz-progresso">
								Questão <span id="spanNumeroDaQuestaoAtual"></span> de <span id="qtdQuestoes"></span>
							</div>
							<div class="quiz-opcoes">
								<label class="quiz-opcao" id="opcaoA" onclick="selecionarOpcao(this)">
									<input type="radio" name="option" value="alternativaA" id="primeiraOpcao">
									<span class="quiz-letra">A</span>
									<span class="quiz-opcao-texto" id="labelOpcaoUm"></span>
								</label>
								<label class="quiz-opcao" id="opcaoB" onclick="selecionarOpcao(this)">
									<input type="radio" name="option" value="alternativaB" id="segundaOpcao">
									<span class="quiz-letra">B</span>
									<span class="quiz-opcao-texto" id="labelOpcaoDois"></span>
								</label>
								<label class="quiz-opcao" id="opcaoC" onclick="selecionarOpcao(this)">
									<input type="radio" name="option" value="alternativaC" id="terceiraOpcao">
									<span class="quiz-letra">C</span>
									<span class="quiz-opcao-texto" id="labelOpcaoTres"></span>
								</label>
								<label class="quiz-opcao" id="opcaoD" onclick="selecionarOpcao(this)">
									<input type="radio" name="option" value="alternativaD" id="quartaOpcao">
									<span class="quiz-letra">D</span>
									<span class="quiz-opcao-texto" id="labelOpcaoQuatro"></span>
								</label>
							</div>
							<div class="quiz-botoes">
								<button class="quiz-btn" id="btnSubmeter" onclick="submeter()">Submeter resposta</button>
								<button class="quiz-btn" id="btnProx" onclick="avancar()" disabled>Avançar para proxima questão</button>
								<button class="quiz-btn btn-full" id="btnTentarNovamente" onclick="tentarNovamente()" disabled>tentar novamente</button>
							</div>
						</div>
					</div>

					<div id="telaResultado" class="quiz-resultado" style="display:none">
						<div class="pontuacao-final"><span id="spanPontuacaoFinal">0</span>/<span id="spanTotalQuestoes">0</span></div>
						<div id="msgFinal" class="mensagem-final"></div>
						<button class="quiz-btn" style="max-width:240px;margin:0 auto" onclick="tentarNovamente()">Tentar novamente</button>
					</div>

				</div>
			</div>
		</div>

	</div>
</body>
</html>

<script>
	let listaDeQuestoes = []
	let idPartidaAtual = null
	let numeroDaQuestaoAtual = 0
	let pontuacaoFinal = 0
	let tentativaIncorreta   = 0
	let certas = 0
	let erradas = 0
	let quantidadeDeQuestoes = 0

	b_usuario.innerHTML = sessionStorage.NOME_USUARIO

	function getIdUsuario() {
		return sessionStorage.getItem("ID_USUARIO")
	}

	function selecionarOpcao(label) {
		document.querySelectorAll('.quiz-opcao').forEach(el => el.classList.remove('selecionada'))
		label.classList.add('selecionada')
		label.querySelector('input[type=radio]').checked = true
	}

	async function carregarQuestoes() {
		const resp = await fetch("/quiz/questoes")
		if (!resp.ok) throw new Error("Erro ao buscar questões")
		const dados = await resp.json()
		listaDeQuestoes = dados.map(q => ({
			id_questao: q.id_questao,
			pergunta: q.enunciado,
			alternativaA: q.alternativa_a,
			alternativaB: q.alternativa_b,
			alternativaC: q.alternativa_c,
			alternativaD: q.alternativa_d,
			alternativaCorreta: q.alternativa_correta
		}))
		quantidadeDeQuestoes = listaDeQuestoes.length
	}

	async function criarPartida() {
		const idUsuario = getIdUsuario()
		if (!idUsuario) { alert("Usuário não autenticado."); return null }
		const resp = await fetch("/quiz/iniciar", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ idUsuario })
		})
		if (!resp.ok) throw new Error("Erro ao criar partida")
		const dados = await resp.json()
		return dados.idPartida
	}

	function registrarResposta(idQuestao, alternativaEscolhida, acertou) {
		if (!idPartidaAtual) return
		fetch("/quiz/resposta", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ idPartida: idPartidaAtual, idQuestao, alternativaEscolhida, acertou })
		})
	}

	async function salvarPlacarFinal() {
		if (!idPartidaAtual) return
		await fetch("/quiz/finalizar", {
			method: "PUT",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ idPartida: idPartidaAtual, qtdAcertos: certas, qtdErros: erradas, pontuacao: pontuacaoFinal })
		})
	}

	async function onloadEsconder() {
		await carregarQuestoes()
	}

	async function iniciarQuiz() {
		if (listaDeQuestoes.length === 0) { alert("Nenhuma questão encontrada no banco."); return }

		idPartidaAtual = await criarPartida()
		if (!idPartidaAtual) return

		numeroDaQuestaoAtual = 0
		pontuacaoFinal = 0; tentativaIncorreta = 0; certas = 0; erradas = 0

		document.getElementById('telaInicio').style.display = "none"
		document.getElementById('telaResultado').style.display = "none"
		document.getElementById('placar').style.display = "flex"
		document.getElementById('jogo').style.display = "block"
		document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

		preencherHTMLcomQuestaoAtual(0)
		btnSubmeter.disabled = false
		btnProx.disabled = true
		btnTentarNovamente.disabled = true
	}

	function preencherHTMLcomQuestaoAtual(index) {
		habilitarAlternativas(true)
		limparCoresOpcoes()
		document.querySelectorAll('.quiz-opcao').forEach(el => el.classList.remove('selecionada'))

		const q = listaDeQuestoes[index]
		numeroDaQuestaoAtual = index
		document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = index + 1
		document.getElementById("spanQuestaoExibida").innerHTML = q.pergunta
		document.getElementById("labelOpcaoUm").innerHTML = q.alternativaA
		document.getElementById("labelOpcaoDois").innerHTML = q.alternativaB
		document.getElementById("labelOpcaoTres").innerHTML = q.alternativaC
		document.getElementById("labelOpcaoQuatro").innerHTML = q.alternativaD
	}

	function submeter() {
		const options = document.getElementsByName("option")
		let hasChecked = false
		for (let i = 0; i < options.length; i++) {
			if (options[i].checked) { hasChecked = true; break }
		}
		if (!hasChecked) {
			alert("Escolha uma alternativa antes de submeter.")
		} else {
			btnSubmeter.disabled = true
			btnProx.disabled     = false
			habilitarAlternativas(false)
			checarResposta()
		}
	}

	function habilitarAlternativas(habilitar) {
		primeiraOpcao.disabled = !habilitar
		segundaOpcao.disabled  = !habilitar
		terceiraOpcao.disabled = !habilitar
		quartaOpcao.disabled   = !habilitar
	}

	function avancar() {
		btnProx.disabled     = true
		btnSubmeter.disabled = false
		document.getElementsByName("option").forEach(o => o.checked = false)

		if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
			preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
		} else if (numeroDaQuestaoAtual == quantidadeDeQuestoes - 1) {
			alert("Atenção... a próxima é a última questão!")
			preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
		} else {
			finalizarJogo()
		}
	}

	function tentarNovamente() {
		window.location.reload()
	}

	// mapa: valor do radio → id do label e id da opcao
	const mapaOpcoes = {
		alternativaA: { labelId: 'labelOpcaoUm',    opcaoId: 'opcaoA' },
		alternativaB: { labelId: 'labelOpcaoDois',  opcaoId: 'opcaoB' },
		alternativaC: { labelId: 'labelOpcaoTres',  opcaoId: 'opcaoC' },
		alternativaD: { labelId: 'labelOpcaoQuatro',opcaoId: 'opcaoD' },
	}

	function checarResposta() {
		const questaoAtual  = listaDeQuestoes[numeroDaQuestaoAtual]
		const correta       = questaoAtual.alternativaCorreta
		const options       = document.getElementsByName("option")

		let alternativaEscolhida = null
		let acertou              = false

		options.forEach((option) => {
			if (!option.checked) return
			alternativaEscolhida = option.value
			acertou = option.value === correta

			const opcaoEscolhidaEl = document.getElementById(mapaOpcoes[option.value].opcaoId)
			const opcaoCorretaEl   = document.getElementById(mapaOpcoes[correta].opcaoId)

			if (acertou) {
				opcaoEscolhidaEl.classList.add('correta')
				pontuacaoFinal++; certas++
			} else {
				opcaoEscolhidaEl.classList.add('errada')
				opcaoCorretaEl.classList.add('correta')
				erradas++
			}

			document.getElementById("spanCertas").innerHTML  = certas
			document.getElementById("spanErradas").innerHTML = erradas
			numeroDaQuestaoAtual++
		})

		if (alternativaEscolhida !== null) {
			registrarResposta(questaoAtual.id_questao, alternativaEscolhida, acertou)
		}
	}

	function limparCoresOpcoes() {
		['opcaoA','opcaoB','opcaoC','opcaoD'].forEach(id => {
			const el = document.getElementById(id)
			el.classList.remove('correta', 'errada', 'selecionada')
		})
	}

	async function finalizarJogo() {
		await salvarPlacarFinal()

		document.getElementById('jogo').style.display          = "none"
		document.getElementById('placar').style.display        = "none"
		document.getElementById('telaResultado').style.display = "flex"

		const porcentagem = pontuacaoFinal / quantidadeDeQuestoes
		let texto, classe

		if (porcentagem <= 0.3) {
			texto  = "De uma olhada no site e tente denovo.."
			classe = "ruim"
		} else if (porcentagem < 0.9) {
			texto  = "Pode melhorar na próxima, hein!"
			classe = "medio"
		} else {
			texto  = "Uau, parabéns! "
			classe = "bom"
		}

		texto += " Você acertou " + Math.round(porcentagem * 100) + "% das questões."

		document.getElementById('spanPontuacaoFinal').innerHTML = pontuacaoFinal
		document.getElementById('spanTotalQuestoes').innerHTML  = quantidadeDeQuestoes
		document.getElementById('msgFinal').innerHTML           = texto
		document.getElementById('msgFinal').className          = "mensagem-final " + classe
	}
</script>
