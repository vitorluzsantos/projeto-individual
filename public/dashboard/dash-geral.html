<!DOCTYPE html>
<html lang="pt-br">

<head>
	<link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Neovim Quiz | Dashboard Geral</title>

	<link rel="stylesheet" href="./../css/dashboards.css">
	<link rel="stylesheet" href="./../css/estilo.css" />
	<script src="../js/sessao.js"></script>

	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<body onload="validarSessao(); carregarDashboardGeral();">

	<div class="janela">

		<div class="header-left">
			<h1>Neovim</h1>
			<div class="hello">
				<h3>Olá, <span id="b_usuario">usuário</span>!</h3>
			</div>
			<div class="btn-nav-white">
				<a href="./dash-pessoal.html"><h3>Pessoal</h3></a>
			</div>
			<div class="btn-nav">
				<h3>Geral</h3>
			</div>
			<div class="btn-nav-white">
				<a href="./quiz.html"><h3>Quiz</h3></a>
			</div>
			<div class="btn-logout" onclick="limparSessao()">
				<h3>Sair</h3>
			</div>
		</div>

		<div class="dash" style="margin-right:180px;">

			<div style="display:flex;justify-content:center;gap:20px;margin:30px 0 10px;flex-wrap:wrap;">
				<div class="card-dash-stat">
					<p class="card-dash-valor" id="totalPartidas">--</p>
					<p class="card-dash-label">partidas jogadas</p>
				</div>
				<div class="card-dash-stat">
					<p class="card-dash-valor" id="totalAcertos" style="color:#4ecca3">--</p>
					<p class="card-dash-label">acertos totais</p>
				</div>
				<div class="card-dash-stat">
					<p class="card-dash-valor" id="taxaGeral">--%</p>
					<p class="card-dash-label">taxa de acerto</p>
				</div>
			</div>

			<h3 class="tituloGraficos" style="margin-top:20px;">Acertos por participantes</h3>
			<div style="display:flex;justify-content:center;gap:20px;margin-bottom:8px;">
				<span style="color:#c8d8c8;font-size:13px;">
					<span style="display:inline-block;width:12px;height:12px;background:#4ecca3;border-radius:2px;margin-right:4px;"></span>Acertos
				</span>
				<span style="color:#c8d8c8;font-size:13px;">
					<span style="display:inline-block;width:12px;height:12px;background:#e05a5a;border-radius:2px;margin-right:4px;"></span>Erros
				</span>
			</div>
			<div class="graph">
				<canvas id="chartBarras"></canvas>
			</div>
			<div class="label-captura">
				<p id="avisoGeral" style="color:white"></p>
			</div>

			<h3 class="tituloGraficos" style="margin-top:30px;">Proporção geral</h3>
			<div style="display:flex;justify-content:center;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:40px;">
				<div style="width:200px;">
					<canvas id="chartDonut"></canvas>
				</div>
				<div style="color:#c8d8c8;font-size:14px;line-height:2.2;">
					<p>
						<span style="display:inline-block;width:12px;height:12px;background:#4ecca3;border-radius:2px;margin-right:6px;"></span>
						Acertos: <span id="pctAcertos" style="color:#4ecca3">--%</span>
					</p>
					<p>
						<span style="display:inline-block;width:12px;height:12px;background:#e05a5a;border-radius:2px;margin-right:6px;"></span>
						Erros: <span id="pctErros" style="color:#e05a5a">--%</span>
					</p>
				</div>
			</div>

		</div>

		<div style="position:fixed;right:0;top:0;width:180px;height:100vh;background:#141814;border-left:1px solid #2a3a2a;padding:20px 12px;overflow-y:auto;z-index:100;">
			<h3 class="tituloGraficos" style="font-size:13px;margin-bottom:16px;">Ranking Geral</h3>
			<div id="rankingList"></div>
		</div>

	</div>

</body>

</html>

<script>
	function carregarDashboardGeral() {
		fetch('/dashboard/geral', { cache: 'no-store' })
			.then(function(response) {
				if (response.ok) {
					response.json().then(function(dados) {
						console.log('Dados recebidos:', JSON.stringify(dados));
						preencherCards(dados);
						plotarBarras(dados);
						plotarDonut(dados);
						preencherRanking(dados);
					});
				} else {
					console.error('Erro na API - status:', response.status);
					document.getElementById('avisoGeral').innerHTML =
						"<i class='fa-solid fa-triangle-exclamation'></i> Não foi possível carregar os dados. Verifique se há partidas cadastradas.";
				}
			})
			.catch(function(error) {
				console.error('Erro ao carregar dashboard geral:', error.message);
				document.getElementById('avisoGeral').innerHTML =
					"<i class='fa-solid fa-triangle-exclamation'></i> Erro de conexão com o servidor.";
			});
	}

	function preencherCards(dados) {
		var totalAcertos  = dados.reduce(function(s, u) { return s + Number(u.total_acertos); }, 0);
		var totalErros    = dados.reduce(function(s, u) { return s + Number(u.total_erros); }, 0);
		var totalPartidas = dados.reduce(function(s, u) { return s + Number(u.total_partidas); }, 0);
		var taxa = (totalAcertos + totalErros) > 0
			? Math.round(totalAcertos / (totalAcertos + totalErros) * 100)
			: 0;

		document.getElementById('totalPartidas').textContent = totalPartidas;
		document.getElementById('totalAcertos').textContent  = totalAcertos;
		document.getElementById('taxaGeral').textContent     = taxa + '%';
		document.getElementById('taxaGeral').style.color     = taxa >= 60 ? '#4ecca3' : '#e05a5a';
	}

	function plotarBarras(dados) {
		var labels  = dados.map(function(u) { return u.nome; });
		var acertos = dados.map(function(u) { return Number(u.total_acertos); });
		var erros   = dados.map(function(u) { return Number(u.total_erros); });

		new Chart(document.getElementById('chartBarras'), {
			type: 'bar',
			data: {
				labels: labels,
				datasets: [
					{ label: 'Acertos', data: acertos, backgroundColor: '#4ecca3', borderRadius: 4 },
					{ label: 'Erros',   data: erros,   backgroundColor: '#e05a5a', borderRadius: 4 }
				]
			},
			options: {
				responsive: true,
				plugins: { legend: { display: false } },
				scales: {
					x: { ticks: { color: '#a0b8a0', font: { size: 11 } }, grid: { color: '#2a3a2a' } },
					y: { ticks: { color: '#a0b8a0', font: { size: 11 } }, grid: { color: '#2a3a2a' }, beginAtZero: true }
				}
			}
		});
	}

	function plotarDonut(dados) {
		var totalAcertos = dados.reduce(function(s, u) { return s + Number(u.total_acertos); }, 0);
		var totalErros   = dados.reduce(function(s, u) { return s + Number(u.total_erros); }, 0);
		var taxa = (totalAcertos + totalErros) > 0
			? Math.round(totalAcertos / (totalAcertos + totalErros) * 100)
			: 0;

		document.getElementById('pctAcertos').textContent = taxa + '%';
		document.getElementById('pctErros').textContent   = (100 - taxa) + '%';

		new Chart(document.getElementById('chartDonut'), {
			type: 'doughnut',
			data: {
				datasets: [{
					data: [totalAcertos, totalErros],
					backgroundColor: ['#4ecca3', '#e05a5a'],
					borderWidth: 0,
					hoverOffset: 6
				}]
			},
			options: {
				cutout: '72%',
				plugins: { legend: { display: false } }
			}
		});
	}

	function preencherRanking(dados) {
		var ranking = dados.slice().sort(function(a, b) {
			return Number(b.total_pontuacao) - Number(a.total_pontuacao);
		});
		var maximo = ranking[0] ? Number(ranking[0].total_pontuacao) : 1;
		var el = document.getElementById('rankingList');
		el.innerHTML = '';

		ranking.forEach(function(usuario, index) {
			var pct = maximo > 0 ? Math.round((Number(usuario.total_pontuacao) / maximo) * 100) : 0;
			el.innerHTML += `
				<div style="display:flex;align-items:center;gap:6px;padding:5px 0;font-size:11px;color:#c8d8c8;border-bottom:1px solid #2a3a2a;">
					<span style="color:#4a6a4a;width:14px;flex-shrink:0;">${index + 1}</span>
					<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${usuario.nome}</span>
					<div style="width:40px;height:8px;background:#2a3a2a;border-radius:3px;overflow:hidden;flex-shrink:0;">
						<div style="width:${pct}%;height:100%;background:#4ecca3;border-radius:3px;"></div>
					</div>
				</div>
			`;
		});
	}
</script>
