<!DOCTYPE html>
<html lang="pt-br">

	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>AquaTech | Cadastro</title>

		<script src="./js/sessao.js"></script>

		<link rel="stylesheet" href="./css/estilo.css" />
		<link rel="icon" href="./assets/icon/favicon2.ico" />
		<link rel="preconnect" href="https://fonts.gstatic.com" />
	</head>

	<body onload="listar()">
		<!--header inicio-->
		<div class="header">
			<div class="container">
				<div class="navTitulo">
					<h1 class="titulo">Neovim</h1>
				</div>
				<div class="navContent">
					<div class="navRight">
						<a class="navLink" href="#">Pagina Inicial</a>
					</div>				
				</div>
				<div class="navButtons">
					<a href="cadastro.html"><button class="btnCadastro">Cadastre-se</button></a>
					<a href="login.html"><button class="btnLogin">Login</button></a>
				</div>
			</div>
		</div>
		<!--header fim-->

		<div class="login">
			<div class="alerta_erro">
				<div class="card_erro" id="cardErro">
					<span id="mensagem_erro"></span>
				</div>
			</div>
			<div class="container">
				<div class="card card-cadastro">
					<div class="formulario">
						<div class="campo">
							<span>Nome:</span>
							<input id="nome_input" type="text" placeholder="Seu nome" />
						</div>
						<div class="campo">
							<span>E-mail:</span>
							<input id="email_input" type="text" placeholder="meuemail@provedor.com" />
						</div>
						<div class="campo">
							<span>Senha:</span>
							<input id="senha_input" type="password" placeholder="******" />
						</div>
						<div class="campo">
							<span>Confirmação da Senha:</span>
							<input id="confirmacao_senha_input" type="password" placeholder="******" />
						</div>
						<button class="botao" onclick="cadastrar()">Cadastre-se</button>
					</div>
					<div id="div_aguardar" class="loading-div">
						<img src="./assets/circle-loading.gif" id="loading-gif" />
					</div>

					<div id="div_erros_login"></div>
				</div>
			</div>
		</div>

	</body>
</html>
<script>
function cadastrar() {

  var nomeVar = nome_input.value;
  var emailVar = email_input.value;
  var senhaVar = senha_input.value;
  var confirmacaoSenhaVar = confirmacao_senha_input.value;

  if (
    nomeVar == "" ||
    emailVar == "" ||
    senhaVar == "" ||
    confirmacaoSenhaVar == ""
  ) {
    cardErro.style.display = "block";
    mensagem_erro.innerHTML = "Preencha todos os campos!";
    return false;
  }

  if (senhaVar !== confirmacaoSenhaVar) {
    cardErro.style.display = "block";
    mensagem_erro.innerHTML = "As senhas não coincidem!";
    return false;
  }

  fetch("/usuarios/cadastrar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      nomeServer: nomeVar,
      emailServer: emailVar,
      senhaServer: senhaVar
    }),
  })
    .then(function (resposta) {

      if (resposta.ok) {
        mensagem_erro.innerHTML =
          "Cadastro realizado com sucesso! Redirecionando...";
        cardErro.style.display = "block";

        setTimeout(() => {
          window.location = "login.html";
        }, 2000);

      } else {
        throw "Erro ao cadastrar";
      }
    })
    .catch(function (erro) {
      console.log(erro);
      mensagem_erro.innerHTML = "Erro no cadastro!";
      cardErro.style.display = "block";
    });

  return false;
}
</script>
