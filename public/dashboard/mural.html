<!DOCTYPE html>
<html lang="pt-br">

	<head>
		<link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
		<meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dashboard</title>

		<link rel="stylesheet" href="./../css/dashboards.css">
		<link rel="stylesheet" href="./../css/estilo.css" />

		<script src="../js/sessao.js"></script>
	</head>

	<body onload="validarSessao()">

		<div class="janela">

			<!-- MENU LATERAL -->
			<div class="header-left dash-header">

				<h1>Neovim</h1>

				<div class="hello">
					<h3>Olá, <span id="b_usuario">usuário</span>!</h3>
				</div>

				<div class="btn-nav">
					<h3>Dashboard</h3>
				</div>

				<div class="btn-nav-white">
					<a href="../questionario.html">
						<h3>Questionário</h3>
					</a>
				</div>

				<div class="btn-nav-white">
					<a href="../simulador.html">
						<h3>Simulador</h3>
					</a>
				</div>

				<div class="btn-logout" onclick="limparSessao()">
					<h3>Sair</h3>
				</div>

			</div>

			<!-- CONTEÚDO -->
			<div class="dash">

				<div class="cards">

					<div class="card">
						<h2>Bem-vindo 👋</h2>
						<p>Usuário: <b id="nome_usuario"></b></p>
						<p>Email: <b id="email_usuario"></b></p>
					</div>

					<div class="card">
						<h2>Seu progresso</h2>
						<p>Aqui você poderá ver seus resultados do questionário futuramente.</p>
					</div>

				</div>

			</div>

		</div>

	</body>

</html>

<script>
function carregarDados() {
	document.getElementById("nome_usuario").innerText = sessionStorage.NOME_USUARIO;
	document.getElementById("email_usuario").innerText = sessionStorage.EMAIL_USUARIO;
}

window.onload = function () {
	validarSessao();
	carregarDados();
}
</script>
