<!DOCTYPE html>
<html lang="pt-br">

	<head>
		<meta charset="UTF-8">
		<title>Dashboard</title>

		<link rel="stylesheet" href="./../css/estilo.css">
		<script src="../js/sessao.js"></script>
	</head>

	<body onload="validarSessao(); buscarQuestionario()">

		<h1>Bem-vindo ao Dashboard</h1>

		<p>Usuário: <span id="b_usuario"></span></p>

		<button onclick="irParaQuestionario()">Ir para Questionário</button>
		<button onclick="limparSessao()">Sair</button>

	</body>

	<script>
function buscarQuestionario() {
	var idUsuario = sessionStorage.ID_USUARIO;

	console.log("ID USUARIO:", idUsuario);

	if (!idUsuario) {
		console.error("Usuário não logado");
		return;
	}

	fetch(`/questionario/buscar/${idUsuario}`)
		.then(res => {
			if (!res.ok) {
				throw new Error("Erro na requisição");
			}
			return res.json();
		})
		.then(dados => {
			console.log("Questionário:", dados);
		})
		.catch(err => console.error(err));
}
	</script>

</html>
